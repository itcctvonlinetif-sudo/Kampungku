kind = "web"
previewPath = "/"
title = "Kampungku - Website Perumahan"
version = "1.0.0"
id = "artifacts/kampungku"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24346

[services.development]
run = "pnpm --filter @workspace/kampungku run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kampungku", "run", "build" ]
publicDir = "artifacts/kampungku/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24346"
BASE_PATH = "/"
